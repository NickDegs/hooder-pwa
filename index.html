<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04080f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hooder" />
    <meta name="description" content="Dünya genelinde gayrimenkul yatırım simülasyonu" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Hooder</title>
  </head>
  <body>
    <!-- iOS 26 Liquid Glass — kırılma/mercek filtresi (Chromium'da aktif, WebKit'te blur'a düşer) -->
    <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
      <filter id="liquidGlass" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.011 0.011" numOctaves="2" seed="42" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="1.6" result="softNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="42" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
