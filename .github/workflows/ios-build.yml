name: iOS → TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Web derleme (Capacitor: base=/, PWA service worker kapalı) ──────────
      # Web sunucusu /hooder/ altında çalışır; WKWebView kök '/' bekler
      - name: Web build (Capacitor)
        run: npm ci && npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_TARGET: capacitor

      # ── Capacitor iOS projesi oluştur ────────────────────────────────────────
      - name: Capacitor iOS setup
        run: |
          npx cap add ios
          npx cap sync ios

      # ── App ikonu üret (assets/icon.png 1024 → AppIcon set) ──────────────────
      - name: Generate app icons
        run: npx @capacitor/assets@3 generate --ios --assetPath assets || echo "ikon üretimi atlandı"

      # ── SPM paket çözümü — Capacitor 8 CocoaPods yerine SPM kullanır ───────
      - name: Resolve SPM packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath /tmp/spm-cache \
            2>&1 | tail -20

      # ── Build numarası güncelle ──────────────────────────────────────────────
      # NOT: Aynı App Store Connect uygulaması (app.realvirtuality.landlord) altına
      # eski Swift/RN build'leri de yüklenmişti (build ~33). TestFlight en yüksek
      # build numarasını "en güncel" gösterir. Capacitor PWA'yı her zaman en üstte
      # tutmak için 9000+ ofset kullanılır → bu wrapper kanonik native sürüm.
      - name: Set build number
        run: |
          PLIST="ios/App/App/Info.plist"
          # Tarih-damgalı build numarası (YYYYMMDDHHMM) → eski Swift/RN tarih-damgalı
          # build'lerini de geçer, hep en üstte kalır. Marketing sürümü 2.0.<run>.
          BUILD=$(date -u +%Y%m%d%H%M)
          [ -f "$PLIST" ] && \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$PLIST" && \
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 4.0.${{ github.run_number }}" "$PLIST" || \
            echo "Info.plist bulunamadı, atlıyorum"
          # Export compliance: şifreleme muaf → TestFlight'ta MISSING_EXPORT_COMPLIANCE
          # olmaz, build doğrudan iç teste atanabilir hale gelir.
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" || true
          # Konum izni açıklaması — geolocation (oto kendi konumuna uçma) iOS'ta
          # bu anahtar olmadan sessizce reddedilir.
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Konumundaki gayrimenkulleri haritada göstermek için konumun kullanılır.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Konumundaki gayrimenkulleri haritada göstermek için konumun kullanılır.'" "$PLIST" || true

      # ── Xcode signing + deployment target ────────────────────────────────────
      - name: Fix signing & deployment target
        run: |
          PBXPROJ="ios/App/App.xcodeproj/project.pbxproj"
          # Deployment target
          sed -i '' -E "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 16.4;/g" "$PBXPROJ"
          # SADECE iPHONE (iPad kaldırıldı) → TARGETED_DEVICE_FAMILY = 1
          sed -i '' -E "s/TARGETED_DEVICE_FAMILY = \"?[0-9,]+\"?;/TARGETED_DEVICE_FAMILY = 1;/g" "$PBXPROJ"
          # Development team
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = SZF4T3P583;/g" "$PBXPROJ"
          sed -i '' "s/DevelopmentTeam = \"\";/DevelopmentTeam = SZF4T3P583;/g" "$PBXPROJ"
          # Manuel signing
          sed -i '' "s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g" "$PBXPROJ"
          # Manuel signing — provisioning profile Fastlane update_code_signing_settings ile ayarlanır

          # Entitlements: APNs push + Sign in with Apple (tek satır printf → YAML güvenli)
          printf '%s' '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>aps-environment</key><string>production</string><key>com.apple.developer.applesignin</key><array><string>Default</string></array></dict></plist>' > ios/App/App/App.entitlements
          sed -i '' "s#CODE_SIGN_STYLE = Manual;#CODE_SIGN_STYLE = Manual; CODE_SIGN_ENTITLEMENTS = App/App.entitlements;#g" "$PBXPROJ"

      # ── Signing sertifikası ──────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERT_BASE64:  ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASS:    ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode -o /tmp/dist.p12
          security create-keychain -p "build_pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain  -p "build_pass" build.keychain
          security import /tmp/dist.p12 -k build.keychain -P "$CERT_PASS" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k "build_pass" build.keychain
          security set-keychain-settings -lut 7200 build.keychain

      # ── Ruby + Fastlane ──────────────────────────────────────────────────────
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # ── TestFlight yükleme ───────────────────────────────────────────────────
      - name: Fastlane beta
        env:
          ASC_KEY_ID:     ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:  ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: bundle exec fastlane beta

      # ── Build'i iç test grubuna ata (TestFlight'ta hemen görünsün) ───────────
      - name: Assign build to internal group
        continue-on-error: true
        env:
          ASC_KEY_ID:      ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:   ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          printf '%s' "$ASC_PRIVATE_KEY" > /tmp/asc.p8
          node -e '
            const {createSign}=require("crypto"), fs=require("fs");
            const p8=fs.readFileSync("/tmp/asc.p8","utf8");
            const APP="6776767786", GROUP="8efaee3a-4a69-41b0-b205-fd80c513051f";
            const b64=o=>Buffer.from(JSON.stringify(o)).toString("base64").replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
            const sleep=ms=>new Promise(r=>setTimeout(r,ms));
            const tok=()=>{const now=Math.floor(Date.now()/1000);
              const si=b64({alg:"ES256",kid:process.env.ASC_KEY_ID,typ:"JWT"})+"."+b64({iss:process.env.ASC_ISSUER_ID,iat:now,exp:now+600,aud:"appstoreconnect-v1"});
              const s=createSign("SHA256");s.update(si);const der=s.sign(p8);
              let o=2;const rl=der[o+1];o+=2;let r=der.slice(o,o+rl);o+=rl;o+=1;const sl=der[o];o+=1;let ss=der.slice(o,o+sl);
              const pad=x=>{x=x[0]===0?x.slice(1):x;return Buffer.concat([Buffer.alloc(32-x.length),x])};
              const jose=Buffer.concat([pad(r),pad(ss)]).toString("base64").replace(/=/g,"").replace(/\+/g,"-").replace(/\//g,"_");
              return {Authorization:"Bearer "+si+"."+jose,"Content-Type":"application/json"};};
            (async()=>{
              // En yeni build VALID olana kadar bekle (max ~15 dk)
              let id=null;
              for(let i=0;i<30;i++){
                const H=tok();
                const j=await (await fetch(`https://api.appstoreconnect.apple.com/v1/builds?filter[app]=${APP}&sort=-uploadedDate&limit=1`,{headers:H})).json();
                const b=j.data&&j.data[0];
                if(b){ id=b.id;
                  if(b.attributes.processingState==="VALID"){
                    // Export compliance garanti (Info.plist boş kalırsa null olabilir)
                    await fetch(`https://api.appstoreconnect.apple.com/v1/builds/${id}`,{method:"PATCH",headers:H,body:JSON.stringify({data:{type:"builds",id,attributes:{usesNonExemptEncryption:false}}})});
                    await sleep(3000);
                    const res=await fetch(`https://api.appstoreconnect.apple.com/v1/betaGroups/${GROUP}/relationships/builds`,{method:"POST",headers:H,body:JSON.stringify({data:[{type:"builds",id}]})});
                    console.log("grup atama:", res.status, res.status===204?"OK":await res.text());
                    return;
                  }
                  console.log(`build ${b.attributes.version} durum=${b.attributes.processingState}, bekleniyor...`);
                }
                await sleep(30000);
              }
              console.log("build zamanında VALID olmadi; oturum manuel atayacak (id:", id, ")");
            })();
          '
