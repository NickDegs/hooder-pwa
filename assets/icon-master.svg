<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10203f"/>
      <stop offset="0.45" stop-color="#0a1730"/>
      <stop offset="1" stop-color="#050a18"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.62">
      <stop offset="0" stop-color="#3d7bff" stop-opacity="0.40"/>
      <stop offset="0.5" stop-color="#2a55c8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#2a55c8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe49a"/>
      <stop offset="0.45" stop-color="#ffc23d"/>
      <stop offset="1" stop-color="#d98b1f"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9ad"/>
      <stop offset="1" stop-color="#c8881c"/>
    </linearGradient>
    <linearGradient id="towerFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f2244"/>
      <stop offset="1" stop-color="#091732"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- premium dark base (full-bleed, iOS squircle mask uygular) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- ince ızgara / harita ipucu (çok hafif) -->
  <g stroke="#3d7bff" stroke-opacity="0.07" stroke-width="2">
    <path d="M0 720 H1024 M0 800 H1024 M0 880 H1024"/>
    <path d="M180 660 L120 1024 M520 660 L560 1024 M860 660 L940 1024"/>
  </g>

  <!-- altın pin gölgesi -->
  <ellipse cx="512" cy="566" rx="232" ry="232" fill="#000000" opacity="0.45" filter="url(#soft)"/>

  <!-- harita pini gövdesi (yuvarlak baş + sivri uç) -->
  <path d="M512 168
           C 660 168 778 286 778 434
           C 778 560 624 712 532 838
           C 521 853 503 853 492 838
           C 400 712 246 560 246 434
           C 246 286 364 168 512 168 Z"
        fill="url(#gold)" stroke="url(#goldRing)" stroke-width="6"/>

  <!-- pin içi koyu disk -->
  <circle cx="512" cy="430" r="196" fill="#071120"/>
  <circle cx="512" cy="430" r="196" fill="url(#glow)" opacity="0.5"/>

  <!-- içindeki gökdelen siluet (emlak imparatorluğu) -->
  <g>
    <!-- sol kule -->
    <rect x="392" y="392" width="64" height="150" rx="6" fill="url(#towerFace)" stroke="#ffc23d" stroke-opacity="0.55" stroke-width="3"/>
    <!-- sağ kule -->
    <rect x="568" y="372" width="64" height="170" rx="6" fill="url(#towerFace)" stroke="#ffc23d" stroke-opacity="0.55" stroke-width="3"/>
    <!-- merkez en yüksek kule -->
    <rect x="474" y="300" width="76" height="242" rx="8" fill="url(#towerFace)" stroke="url(#goldRing)" stroke-width="4"/>
    <!-- merkez kule altın tepe -->
    <path d="M474 300 L512 262 L550 300 Z" fill="url(#gold)"/>
    <!-- pencere ışıkları (altın) -->
    <g fill="#ffd76a">
      <rect x="492" y="330" width="40" height="9" rx="3"/>
      <rect x="492" y="356" width="40" height="9" rx="3"/>
      <rect x="492" y="382" width="40" height="9" rx="3"/>
      <rect x="492" y="408" width="40" height="9" rx="3"/>
      <rect x="492" y="434" width="40" height="9" rx="3"/>
      <rect x="492" y="460" width="40" height="9" rx="3"/>
    </g>
    <g fill="#ffd76a" opacity="0.85">
      <rect x="406" y="418" width="36" height="8" rx="3"/>
      <rect x="406" y="442" width="36" height="8" rx="3"/>
      <rect x="406" y="466" width="36" height="8" rx="3"/>
      <rect x="406" y="490" width="36" height="8" rx="3"/>
      <rect x="582" y="398" width="36" height="8" rx="3"/>
      <rect x="582" y="422" width="36" height="8" rx="3"/>
      <rect x="582" y="446" width="36" height="8" rx="3"/>
      <rect x="582" y="470" width="36" height="8" rx="3"/>
      <rect x="582" y="494" width="36" height="8" rx="3"/>
    </g>
  </g>

  <!-- pin parlama vurgusu -->
  <ellipse cx="430" cy="312" rx="70" ry="44" fill="#ffffff" opacity="0.18"/>
</svg>
